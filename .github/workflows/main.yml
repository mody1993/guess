name: WOLFdle Auto Player

on:
  schedule:
    - cron: '0 0 * * *' # يعمل تلقائياً كل يوم الساعة 12 منتصف الليل بتوقيت جرينتش
  workflow_dispatch: # يتيح لك إمكانية تشغيل البوت يدوياً بضغطة زر من موقع جيتهاب لتجربته

jobs:
  play-game:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 سحب الكود من المستودع
        uses: actions/checkout@v4

      - name: 🟢 إعداد بيئة نود جي إس
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 تثبيت المكتبات (Puppeteer)
        run: npm install

      - name: 🚀 تشغيل البوت الذكي
        run: npm start
